name: Build QuantumultX & Surge rule-set (list)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Python3
      uses: actions/setup-python@v2
      with:
        python-version: 3.x

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests pyyaml

    - name: Fetch upstream meta-rules-dat links
      run: python fetch_meta_links.py
      working-directory: ./script/
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build QuantumultX rule-set
      run: python build_qx.py
      working-directory: ./script/

    - name: Build Surge rule-set
      run: python build_surge.py
      working-directory: ./script/

    - name: Commit and push rules/quantumultx + rules/surge + georules/quantumultx + georules/surge
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"

        git add ./rules/quantumultx ./rules/surge ./georules/quantumultx ./georules/surge ./links/links-meta.txt

        if git diff --staged --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git commit -m "Update QuantumultX/Surge rule-set"

        for i in 1 2 3 4 5; do
          git fetch origin main
          if git rebase origin/main && git push origin HEAD:main; then
            echo "push 成功"
            exit 0
          fi

          git rebase --abort 2>/dev/null || true
          echo "push 冲突，第 $i 次重试..."
          sleep $(( (RANDOM % 8) + 2 ))
        done

        echo "重试多次仍失败"
        exit 1
