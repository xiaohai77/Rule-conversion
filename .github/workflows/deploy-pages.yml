name: Deploy rule feed to Cloudflare Pages

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Python3
      uses: actions/setup-python@v2
      with:
        python-version: 3.x

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install markdown

    - name: Generate index pages
      run: python3 script/generate_index.py

    - name: Prepare deploy directory (exclude .github)
      run: |
        rm -rf .deploy
        mkdir .deploy
        rsync -a --exclude='.git' --exclude='.github' --exclude='.deploy' ./ ./.deploy/

    - name: Deploy to Cloudflare Pages
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        projectName: ${{ secrets.CLOUDFLARE_PAGES }}
        directory: .deploy
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}
