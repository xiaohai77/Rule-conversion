UA_T: &UA_T {type: http, interval: 21600, header: {User-Agent: ["clash-verge/v2.4.7"]}}
proxy-providers:
  Sub1:
    <<: *UA_T
    url: ""
    path: ./providers/Sub1.yaml
  Sub2:
    <<: *UA_T
    url: ""
    path: ./providers/Sub2.yaml    

SUBS: &SUBS [Sub1, Sub2]

HEALTH_CHECK: &HEALTH_CHECK 
  {enable: true, interval: 300, lazy: false, url: 'https://www.gstatic.com/generate_204', tolerance: 80, timeout: 5000}

SELECT_T: &SELECT_T {type: select, use: *SUBS, <<: *HEALTH_CHECK}  

AUTO_T: &AUTO_T {type: url-test, use: *SUBS, <<: *HEALTH_CHECK, hidden: true}

FALLBACK_T: &FALLBACK_T {type: fallback, use: *SUBS, <<: *HEALTH_CHECK, hidden: true}

OT_T: &OT_T '^(?i)(?!.*(香港|Hong Kong|Taiwan|台湾|TW|Japan|日本|JP|Singapore|新加坡|SG|America|美|US|United States|America|Korea|韩国|KR|UK|英国|United Kingdom|France|法国|\bFR\b|Germany|德国|DE|Netherlands|荷兰|NL|𝑺𝒕𝒂𝒄𝒌|𝑭𝒊𝒓𝒔𝒕|群|官网|流量|剩余|频道)).*$'

mixed-port: 7890
log-level: error
ipv6: true
allow-lan: true

external-controller: "[::]:9090"
external-ui: ui
external-ui-url: "https://gh.445568.xyz/https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip"

unified-delay: true
tcp-concurrent: true
find-process-mode: off

keep-alive-idle: 300
keep-alive-interval: 75

profile:
  store-selected: true
  store-fake-ip: true

tun:
  enable: true
  stack: system
  device: Nikki
  dns-hijack:
    - "udp://any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  disable-icmp-forwarding: true

dns:
  enable: true
  ipv6: true
  cache-algorithm: arc
  listen: "[::]:1053"
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "rule-set:private"
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6
  nameserver:
    - https://dns.alidns.com/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
  nameserver-policy:
    "rule-set:china-list": [dns.alidns.com]
    "rule-set:proxy-list": [https://dns.google/dns-query#𝑷𝑹𝑶𝑿𝒀]
    
hosts:
  dns.alidns.com: [223.5.5.5, 223.6.6.6]
  dns.google: [8.8.8.8, 8.8.4.4]

proxies:
  - name: 𝑰𝑷𝒗𝟒 𝑭𝒊𝒓𝒔𝒕
    type: direct
    ip-version: ipv4-prefer
  - name: 𝑰𝑷𝒗𝟔 𝑭𝒊𝒓𝒔𝒕
    type: direct
    ip-version: ipv6-prefer
  - name: 𝑫𝒖𝒂𝒍 𝑺𝒕𝒂𝒄𝒌
    type: direct
  
proxy-groups:
- {name: 𝑯𝑲 𝑵𝒐𝒅𝒆, <<: *SELECT_T, filter: '(?i)港|HK|Hong Kong', proxies: [𝑯𝑲-𝑨𝑼𝑻𝑶, 𝑯𝑲-𝑭𝑨𝑳𝑳], icon: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/icon/color/hk.png}
- {name: 𝑱𝑷 𝑵𝒐𝒅𝒆, <<: *SELECT_T, filter: '(?i)日本|东京|大阪|JP|Japan', proxies: [𝑱𝑷-𝑨𝑼𝑻𝑶, 𝑱𝑷-𝑭𝑨𝑳𝑳], icon: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/icon/color/jp.png}
- {name: 𝑺𝑮 𝑵𝒐𝒅𝒆, <<: *SELECT_T, filter: '(?i)新加坡|坡|SG|狮城|Singapore', proxies: [𝑺𝑮-𝑨𝑼𝑻𝑶, 𝑺𝑮-𝑭𝑨𝑳𝑳], icon: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/icon/color/sg.png}
- {name: 𝑼𝑺 𝑵𝒐𝒅𝒆, <<: *SELECT_T, filter: '(?i)美|US|United States|America', proxies: [𝑼𝑺-𝑨𝑼𝑻𝑶, 𝑼𝑺-𝑭𝑨𝑳𝑳], icon: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/icon/color/us.png}
- {name: 𝑬𝑼 𝑵𝒐𝒅𝒆, <<: *SELECT_T, filter: '(?i)UK|英国|United Kingdom|France|法国|\bFR\b|Germany|德国|DE|Netherlands|荷兰|NL', proxies: [𝑬𝑼-𝑨𝑼𝑻𝑶, 𝑬𝑼-𝑭𝑨𝑳𝑳], icon: https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/EuropeanUnion(2).png}
